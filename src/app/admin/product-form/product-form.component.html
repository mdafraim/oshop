
<div class="row">
    <div class="col-md-6">
        <form [formGroup]="productForm" (ngSubmit)="save()">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" formControlName="title" class="form-control">
                <div class="alert alert-danger" *ngIf="title?.touched && title?.invalid">
                    Title is required..!
                </div>
            </div>
              <div class="form-group">
                <label for="price">Price</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" formControlName="price" id="price" class="form-control" aria-label="Amount (to the nearest dollar)">
                </div>
                <div class="alert alert-danger" *ngIf="price?.touched && price?.invalid">
                    Price is required..!
                </div>
              </div>
              <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category" class="form-control" formControlName="category">
                    <option value=""></option>
                    <option *ngFor="let Data of data" [value]="Data.name">{{Data.name}}</option>
                </select>
                <div class="alert alert-danger" *ngIf="category?.touched && category?.invalid">
                    Select category..!
                </div>
              </div>
            <div class="form-group">
                <label for="imageUrl">Image Url</label>
                <input type="text" formControlName="imageUrl" id="imageUrl" class="form-control">
                <div class="alert alert-danger" *ngIf="imageUrl?.touched && imageUrl?.invalid">
                    Image is required..!
                </div>
            </div>
            <button class="btn btn-primary">Save</button>
            <button class="btn btn-danger" (click)="deleteProduct(product._id)">Delete</button>
        </form>
    </div>
    <div class="col-md-6">
        <div class="card">
            <img [src]="imageUrl?.value" class="card-img-top">
            <div class="card-body">
              <h3 class="card-title">{{title?.value}}</h3>
              <p class="card-text">{{price?.value | currency: 'USD'}}</p>
            </div>
          </div>
    </div>
</div>
