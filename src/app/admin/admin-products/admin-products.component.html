<p>
    <a routerLink="/admin/product/new" class="btn btn-primary mt-3">New Product</a>
</p>
<p>
    <input type="text" class="form-control" [(ngModel)]="cityName" placeholder="Search...">
</p>
        <table class="table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Price</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let data of product | filter:cityName | paginate:{itemsPerPage: 5, currentPage:page, totalItems: totalLength}">
                    <td>{{data.title}}</td>
                    <td>{{data.price | currency: 'USD'}}</td>
                    <td><a [routerLink]="['/admin/product/', data._id]">Edit</a></td>
                </tr>
            </tbody>
        </table>
        <div class="pagination">
            <pagination-controls (pageChange)="page=$event"></pagination-controls>
        </div>
