
<div class="row">
    <div class="col-3">
        <product-filter [category]="category"></product-filter>
    </div>
    <div class="col-9">
        <div class="row">
            <ng-container *ngFor="let products of product; let i = index">
                <div class="col">
                    <product-card [products]="products"></product-card>
                </div>
                <div *ngIf="(i + 1) % 2 === 0" class="w-100"></div>
            </ng-container>
        </div>
    </div>
</div>
