<div class="container">
    <div class="row">
        <div class="col-sm-12 md-8 lg-6">
            <form id="form" [formGroup]="loginForm" (ngSubmit)="login()">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" formControlName="email" id="email" class="form-control">
                <div class="alert alert-danger" *ngIf="email?.touched && email?.invalid">
                  Name is required..!
                </div>
              </div>
              <div class="form-group">
                <label for="email">Password</label>
                <input type="password" formControlName="password" id="password" class="form-control">
                <div class="alert alert-danger" *ngIf="password?.touched && password?.invalid">
                  Password is required..!
                </div>

              </div>
              
              <div class="row mb-4 mt-4">
                <div class="col d-flex justify-content-center">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="form2Example31" checked />
                    <label class="form-check-label" for="form2Example31"> Remember me </label>
                  </div>
                </div>
            
                <div class="col">
                  <a href="#!">Forgot password?</a>
                </div>
              </div>
              <button class="btn btn-primary">Sign In</button>
              <div class="text-center mt-4">
                <p>Not a member? <a href="">Register</a></p>
